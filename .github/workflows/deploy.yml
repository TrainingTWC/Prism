name: Deploy Prism Dashboard to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_EMPLOYEE_TABLE: ${{ secrets.VITE_SUPABASE_EMPLOYEE_TABLE }}
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
          VITE_TRAINER_CALENDAR_SCRIPT_URL: ${{ secrets.VITE_TRAINER_CALENDAR_SCRIPT_URL }}
          VITE_EMPLOYEE_DIRECTORY_URL: ${{ secrets.VITE_EMPLOYEE_DIRECTORY_URL }}
          VITE_STORE_MAPPING_SCRIPT_URL: ${{ secrets.VITE_STORE_MAPPING_SCRIPT_URL }}
          VITE_QA_SCRIPT_URL: ${{ secrets.VITE_QA_SCRIPT_URL }}
          VITE_VENDOR_AUDIT_SCRIPT_URL: https://script.google.com/macros/s/AKfycbxK4SRHyp4Rr7SX-l__-K6Xv_0Y7RxksZv6ZZLXTqN1Ox6vPc6D2Qyqv7zku2zMFUJc8g/exec
          VITE_QA_CAPA_SCRIPT_URL: ${{ secrets.VITE_QA_CAPA_SCRIPT_URL }}
          VITE_NATIONAL_FINALS_SCRIPT_URL: ${{ secrets.VITE_NATIONAL_FINALS_SCRIPT_URL }}
          VITE_CF_AUDIT_SCRIPT_URL: https://script.google.com/macros/s/AKfycbzWTWSgtJuVlQN6_jjCvK3VD43Yc8saaaSjheDgE87lm3Ot7dOe8TJ8qePHINByu_lM3g/exec
          VITE_VEHICLE_AUDIT_SCRIPT_URL: https://script.google.com/macros/s/AKfycbwF-RLe7gqUjgRmAcO6ENL8bMDfY4LC9W1aNrzZLF0aWJyUsjE0twpNeNaJdDT2koFpYw/exec

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
